<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU SecOps Engine | Professional SSL Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #101520 0%, #050505 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00f2ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .subtitle {
            color: var(--primary);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .search-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px 20px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--border); }

        button {
            background: linear-gradient(45deg, #00f2ff, #0072ff);
            border: none;
            border-radius: 10px;
            padding: 0 40px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s ease-out;
        }

        .dashboard-grid.visible { opacity: 1; transform: translateY(0); }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--primary); background: rgba(255, 255, 255, 0.08); }

        .card-title {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-point { margin-bottom: 15px; }
        .label { color: #888; font-size: 0.9rem; display: block; }
        .value { color: #eee; font-size: 1.1rem; word-break: break-all; }

        .grade-badge {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin: 20px 0;
        }

        .grade-A { color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .grade-B { color: #00f2ff; text-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .grade-F { color: #ff3366; text-shadow: 0 0 20px rgba(255,51,102,0.3); }

        #loading { display: none; text-align: center; margin: 40px 0; color: var(--primary); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ISU SecOps ENGINE</h1>
            <div class="subtitle">Profesyonel SSL/TLS Pentest Portalı</div>
        </header>

        <div class="search-container">
            <input type="text" id="target" placeholder="Hedef Domain (örn: google.com)" value="google.com">
            <button onclick="startAudit()">ANALİZİ BAŞLAT</button>
        </div>

        <div id="loading">🚀 Güvenlik taraması yapılıyor, lütfen bekleyin...</div>

        <div id="results" class="dashboard-grid">
            <!-- Dinamik Sonuçlar -->
        </div>
    </div>

    <script>
        async function startAudit() {
            const host = document.getElementById('target').value;
            if (!host) return;

            const resDiv = document.getElementById('results');
            const loadDiv = document.getElementById('loading');
            
            resDiv.innerHTML = '';
            resDiv.classList.remove('visible');
            loadDiv.style.display = 'block';

            try {
                const response = await fetch(`/api/scan/${host}`);
                const data = await response.json();
                
                if (data.error) {
                    alert('Hata: ' + data.error);
                } else {
                    renderResults(data);
                }
            } catch (e) {
                alert('Bağlantı hatası!');
            } finally {
                loadDiv.style.display = 'none';
            }
        }

        function renderResults(data) {
            const resDiv = document.getElementById('results');
            
            let html = `
                <div class="card">
                    <div class="card-title">🛡️ GÜVENLİK SKORU</div>
                    <div class="grade-badge grade-${data.grade[0]}">${data.grade}</div>
                </div>

                <div class="card">
                    <div class="card-title">📡 SUNUCU BİLGİSİ</div>
                    <div class="data-point"><span class="label">IP Adresi</span><span class="value">${data.geo_info?.query || 'N/A'}</span></div>
                    <div class="data-point"><span class="label">Lokasyon</span><span class="value">${data.geo_info?.city}, ${data.geo_info?.country}</span></div>
                    <div class="data-point"><span class="label">Servis Sağlayıcı</span><span class="value">${data.geo_info?.isp}</span></div>
                </div>

                <div class="card">
                    <div class="card-title">📜 SERTİFİKA ANALİZİ</div>
                    <div class="data-point"><span class="label">Common Name (CN)</span><span class="value">${data.certificate?.common_name}</span></div>
                    <div class="data-point"><span class="label">Geçerlilik Durumu</span><span class="value">${data.certificate?.is_valid ? '✅ GEÇERLİ' : '❌ GEÇERSİZ'}</span></div>
                    <div class="data-point"><span class="label">CT Günlük Kaydı</span><span class="value">${data.certificate?.ct_logged ? '✅ VAR' : '⚠️ YOK'}</span></div>
                    <div class="data-point"><span class="label">HSTS Politikası</span><span class="value">${data.certificate?.hsts_enabled ? '✅ AKTİF' : '⚠️ PASİF'}</span></div>
                </div>

                <div class="card">
                    <div class="card-title">🧬 PROTOKOLLER</div>
                    ${data.tls_versions.map(v => `
                        <div class="data-point">
                            <span class="label">${v.version}</span>
                            <span class="value" style="color: ${v.supported ? '#00ff88' : '#888'}">
                                ${v.supported ? 'DESTEKLENİYOR' : 'DESTEKLENMİYOR'}
                            </span>
                        </div>
                    `).join('')}
                </div>

                <div class="card">
                    <div class="card-title">🚨 TESPİT EDİLEN RİSKLER</div>
                    ${data.vulnerabilities.length > 0 
                        ? data.vulnerabilities.map(v => `<div class="data-point"><span class="value" style="color: #ff3366">⚠️ ${v}</span></div>`).join('')
                        : '<div class="data-point"><span class="value" style="color: #00ff88">✅ Kritik risk bulunamadı.</span></div>'}
                </div>
            `;

            resDiv.innerHTML = html;
            setTimeout(() => resDiv.classList.add('visible'), 100);
        }
    </script>
</body>
</html>
