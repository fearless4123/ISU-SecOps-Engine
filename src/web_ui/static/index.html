<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU SecOps Engine | Professional SSL/TLS Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.12) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3rem 2rem;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            flex: 1;
            max-width: 1100px;
            width: 90%;
            margin: 0 auto;
            padding-bottom: 5rem;
        }

        .search-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 2rem;
            display: flex;
            gap: 1.25rem;
            margin: 2rem 0;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            flex: 1;
            font-size: 1.125rem;
            padding: 0.5rem 1.25rem;
            outline: none;
        }

        button {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: #fff;
            padding: 0.875rem 2.5rem;
            border-radius: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .dashboard-grid.active {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1.75rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 {
            font-size: 1.125rem;
            margin-bottom: 2rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .info-item {
            margin-bottom: 1.25rem;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.375rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-all;
        }

        .grade-highlight {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1.5rem 0;
            line-height: 1;
        }

        .status-pill {
            display: inline-block;
            padding: 0.375rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .pill-success { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .pill-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .pill-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }

        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin: 4rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1.5rem;
            border-radius: 1.25rem;
            margin-bottom: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SECOPS ENGINE</div>
        <div class="subtitle">Professional SSL/TLS Security Analyzer & Compliance Auditor</div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="targetHost" placeholder="Enter target domain or IP (e.g., google.com)" value="google.com">
            <button id="scanBtn" onclick="runScan()">Start Audit</button>
        </div>

        <div id="error" class="error-box"></div>
        <div id="loader" class="loader"></div>

        <div id="dashboard" class="dashboard-grid">
            <!-- Security Score -->
            <div class="card" style="align-items: center; text-align: center; justify-content: center;">
                <h3>Overall Security Grade</h3>
                <div id="resGrade" class="grade-highlight">-</div>
                <div id="resGradeDetail" class="subtitle">Enter a domain to begin</div>
            </div>

            <!-- Cert Details -->
            <div class="card">
                <h3>Certificate Summary</h3>
                <div class="info-item">
                    <div class="info-label">Common Name</div>
                    <div class="info-value" id="resCN">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Key Info & Strength</div>
                    <div class="info-value" id="resKey">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Signature Alg</div>
                    <div class="info-value" id="resSig">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">HSTS Status</div>
                    <div id="resHSTS">-</div>
                </div>
            </div>

            <!-- HANDSHAKE & PROTOCOLS -->
            <div class="card">
                <h3>Protocols & Connection</h3>
                <div class="info-item">
                    <div class="info-label">Cipher Suite</div>
                    <div class="info-value" id="resCipher" style="color: var(--accent-primary)">-</div>
                </div>
                <div id="protocolList">
                    <div class="info-row" style="display:flex; justify-content:space-between; margin-bottom:0.75rem;">
                        <span style="color:var(--text-secondary)">TLS 1.2</span>
                        <span id="resTLS12">-</span>
                    </div>
                    <div class="info-row" style="display:flex; justify-content:space-between;">
                        <span style="color:var(--text-secondary)">TLS 1.3</span>
                        <span id="resTLS13">-</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function runScan() {
            const host = document.getElementById('targetHost').value;
            if (!host) return;

            const scanBtn = document.getElementById('scanBtn');
            const loader = document.getElementById('loader');
            const dashboard = document.getElementById('dashboard');
            const error = document.getElementById('error');

            scanBtn.disabled = true;
            loader.style.display = 'block';
            dashboard.classList.remove('active');
            error.style.display = 'none';

            try {
                const response = await fetch(`/api/scan/ssl?host=${encodeURIComponent(host)}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                // Update UI Values
                document.getElementById('resGrade').innerText = data.grade.split(' ')[0];
                document.getElementById('resGradeDetail').innerText = data.grade;

                if (data.certificate) {
                    const cert = data.certificate;
                    document.getElementById('resCN').innerText = cert.common_name;
                    document.getElementById('resKey').innerText = cert.key_info;
                    document.getElementById('resSig').innerText = cert.signature_algorithm;
                    document.getElementById('resCipher').innerText = cert.cipher_suite;
                    
                    document.getElementById('resHSTS').innerHTML = cert.hsts_enabled ? 
                        '<span class="status-pill pill-success">HSTS ENABLED</span>' : 
                        '<span class="status-pill pill-danger">HSTS MISSING</span>';

                    // Protocols
                    const tls12 = data.tls_versions.find(v => v.version === 'TLS 1.2');
                    const tls13 = data.tls_versions.find(v => v.version === 'TLS 1.3');
                    
                    document.getElementById('resTLS12').innerHTML = tls12?.supported ? 
                        '<span style="color:var(--success)">SUPPORTED</span>' : '<span style="color:var(--danger)">NO</span>';
                    document.getElementById('resTLS13').innerHTML = tls13?.supported ? 
                        '<span style="color:var(--success)">SUPPORTED</span>' : '<span style="color:var(--danger)">NO</span>';
                }

                dashboard.classList.add('active');
            } catch (e) {
                error.innerText = `Audit failed: ${e.message}`;
                error.style.display = 'block';
            } finally {
                scanBtn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
