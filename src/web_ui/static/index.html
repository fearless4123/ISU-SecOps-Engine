<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU SecOps Engine | Professional SSL/TLS Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.12) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.12) 0px, transparent 50%); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

        header { padding: 2rem; text-align: center; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -0.05em; background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        main { flex: 1; max-width: 1200px; width: 90%; margin: 0 auto; padding-bottom: 5rem; }

        .search-container { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); padding: 1.25rem; border-radius: 2rem; display: flex; gap: 1.25rem; margin: 2rem 0; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5); }
        input { background: transparent; border: none; color: var(--text-primary); flex: 1; font-size: 1.125rem; padding: 0.5rem 1.25rem; outline: none; }
        button { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; color: #fff; padding: 0.875rem 2.5rem; border-radius: 1.25rem; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; opacity: 0; transform: translateY(30px); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .dashboard-grid.active { opacity: 1; transform: translateY(0); }

        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 1.75rem; padding: 2rem; display: flex; flex-direction: column; }
        .card h3 { font-size: 1.125rem; margin-bottom: 2rem; color: var(--accent-primary); }

        .grade-highlight { font-size: 5rem; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pill { display: inline-block; padding: 0.375rem 0.75rem; border-radius: 0.6rem; font-size: 0.7rem; font-weight: 700; }
        .pill-success { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .pill-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }

        /* Vulnerability Icons */
        .vuln-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
        .vuln-safe { color: var(--success); }
        .vuln-risk { color: var(--danger); }

        .trust-chain { position: relative; padding-left: 20px; border-left: 2px dashed var(--border-color); margin: 1rem 0; }
        .chain-node { position: relative; margin-bottom: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 1rem; border: 1px solid var(--border-color); }
        .chain-node::before { content: ""; position: absolute; left: -26px; top: 24px; width: 12px; height: 12px; background: var(--accent-primary); border-radius: 50%; box-shadow: 0 0 10px var(--accent-primary); }
        .chain-node.leaf::before { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .node-name { display: block; font-weight: 700; font-size: 0.9rem; color: var(--text-primary); }
        .node-type { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; }

        .header-matrix { display: flex; flex-direction: column; gap: 0.75rem; }
        .header-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
        .header-name { font-size: 0.85rem; color: var(--text-secondary); }

        .loader { display: none; width: 50px; height: 50px; border: 4px solid rgba(56, 189, 248, 0.1); border-top: 4px solid var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 4rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 1.5rem; border-radius: 1.25rem; margin-bottom: 2rem; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SECOPS ENGINE</div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="targetHost" placeholder="Enter target domain" value="google.com">
            <button id="scanBtn" onclick="runScan()">Analyze</button>
        </div>

        <div id="error" class="error-box"></div>
        <div id="loader" class="loader"></div>

        <div id="dashboard" class="dashboard-grid">
            <div class="card" style="text-align: center;">
                <h3>Audit Grade</h3>
                <div id="resGrade" class="grade-highlight">-</div>
                <div id="resGradeSub" class="subtitle" style="color:var(--text-secondary)">-</div>
            </div>

            <div class="card">
                <h3>Vulnerability Assessment</h3>
                <div id="vulnList">
                    <!-- Vulns populated here -->
                </div>
            </div>

            <div class="card">
                <h3>Trust Path Hierarchy</h3>
                <div id="resChain" class="trust-chain"></div>
            </div>

            <div class="card">
                <h3>Compliance Matrix</h3>
                <div class="header-matrix" id="headerList"></div>
            </div>
        </div>
        <button class="status-pill pill-success" style="margin-top:2rem; width:100%; padding:1rem; cursor:pointer;" onclick="window.print()">PRINT AUDIT REPORT</button>
    </main>

    <script>
        async function runScan() {
            const host = document.getElementById('targetHost').value;
            const loader = document.getElementById('loader');
            const dashboard = document.getElementById('dashboard');
            const error = document.getElementById('error');
            loader.style.display = 'block';
            dashboard.classList.remove('active');
            error.style.display = 'none';

            try {
                const response = await fetch(`/api/scan/ssl?host=${encodeURIComponent(host)}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('resGrade').innerText = data.grade.split(' ')[0];
                document.getElementById('resGradeSub').innerText = data.grade;

                const vulnList = document.getElementById('vulnList');
                vulnList.innerHTML = '';
                const scanChecks = [
                    { name: 'Heartbleed Protocol Probe', key: 'Insecure Heartbeat' },
                    { name: 'POODLE SSLv3 CBC Check', key: 'POODLE' },
                    { name: 'FREAK/Logjam Export Probe', key: 'FREAK' }
                ];
                
                scanChecks.forEach(check => {
                    const found = data.vulnerabilities && data.vulnerabilities.some(v => v.includes(check.key));
                    const div = document.createElement('div');
                    div.className = 'vuln-item';
                    div.innerHTML = `<span class="${found ? 'vuln-risk' : 'vuln-safe'}">${found ? '✖' : '✔'}</span><span style="font-size:0.85rem">${check.name}</span><span class="status-pill ${found ? 'pill-danger' : 'pill-success'}" style="margin-left:auto">${found ? 'VULNERABLE' : 'SAFE'}</span>`;
                    vulnList.appendChild(div);
                });

                const chainBox = document.getElementById('resChain');
                chainBox.innerHTML = '';
                if (data.cert_chain) {
                    data.cert_chain.forEach((node, i) => {
                        const div = document.createElement('div');
                        div.className = `chain-node ${i === 0 ? 'leaf' : ''}`;
                        div.innerHTML = `<span class="node-type">${i === 0 ? 'End Entity' : (i === data.cert_chain.length - 1 ? 'Root' : 'Intermediate')}</span><span class="node-name">${node}</span>`;
                        chainBox.appendChild(div);
                    });
                }

                const headerList = document.getElementById('headerList');
                headerList.innerHTML = '';
                const targets = ["Strict-Transport-Security", "Content-Security-Policy", "X-Frame-Options"];
                if (data.certificate) {
                    targets.forEach(h => {
                        const row = document.createElement('div');
                        row.className = 'header-row';
                        const present = data.certificate.security_headers && data.certificate.security_headers[h];
                        row.innerHTML = `<span class="header-name">${h}</span><span class="status-pill ${present ? 'pill-success' : 'pill-danger'}">${present ? 'YES' : 'NO'}</span>`;
                        headerList.appendChild(row);
                    });
                }

                dashboard.classList.add('active');
            } catch (e) {
                error.innerText = `Error: ${e.message}`;
                error.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
