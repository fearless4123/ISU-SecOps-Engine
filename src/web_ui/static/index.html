<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU SecOps Engine | Professional SSL/TLS Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.12) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.12) 0px, transparent 50%); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

        header { padding: 2rem; text-align: center; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -0.05em; background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        main { flex: 1; max-width: 1400px; width: 95%; margin: 0 auto; padding-bottom: 5rem; }

        .search-container { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); padding: 1rem; border-radius: 2rem; display: flex; gap: 1rem; margin: 2rem 0; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5); }
        input { background: transparent; border: none; color: var(--text-primary); flex: 1; padding: 0.5rem 1rem; outline: none; }
        button { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; color: #fff; padding: 0.8rem 2rem; border-radius: 1.25rem; font-weight: 700; cursor: pointer; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; opacity: 0; transform: translateY(30px); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .dashboard-grid.active { opacity: 1; transform: translateY(0); }

        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 1.5rem; display: flex; flex-direction: column; }
        .card h3 { font-size: 1rem; margin-bottom: 1.5rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.1em; }

        .grade-highlight { font-size: 4rem; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pill { display: inline-block; padding: 0.3rem 0.6rem; border-radius: 0.5rem; font-size: 0.65rem; font-weight: 700; }
        .pill-success { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .pill-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }

        .intel-item { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1rem; }
        .intel-label { font-size: 0.7rem; color: var(--text-secondary); }
        .intel-value { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }

        .trust-chain { position: relative; padding-left: 15px; border-left: 2px dashed var(--border-color); }
        .chain-node { position: relative; margin-bottom: 1rem; padding: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--border-color); }
        .node-name { font-weight: 700; font-size: 0.8rem; }

        .loader { display: none; width: 40px; height: 40px; border: 4px solid rgba(56, 189, 248, 0.1); border-top: 4px solid var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 4rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 1rem; border-radius: 1rem; margin-bottom: 2rem; text-align: center; }
    </style>
</head>
<body>
    <header><div class="logo">SECOPS ENGINE v0.5</div></header>
    <main>
        <div class="search-container">
            <input type="text" id="targetHost" placeholder="Domain name (google.com)" value="google.com">
            <button id="scanBtn" onclick="runScan()">SECURE AUDIT</button>
        </div>
        <div id="error" class="error-box"></div>
        <div id="loader" class="loader"></div>

        <div id="dashboard" class="dashboard-grid">
            <div class="card" style="text-align: center;">
                <h3>Compliance Grade</h3>
                <div id="resGrade" class="grade-highlight">-</div>
                <div id="resGradeSub" style="font-size: 0.8rem; color:var(--text-secondary)">-</div>
            </div>

            <div class="card">
                <h3>Global Intelligence</h3>
                <div id="intelBox">
                    <div class="intel-item"><span class="intel-label">Physical Location</span><span id="resLoc" class="intel-value">-</span></div>
                    <div class="intel-item"><span class="intel-label">ISP / Organization</span><span id="resISP" class="intel-value">-</span></div>
                    <div class="intel-item"><span class="intel-label">AS / Network</span><span id="resASN" class="intel-value">-</span></div>
                    <div class="intel-item"><span class="intel-label">Server IPv4</span><span id="resIP" class="intel-value">-</span></div>
                </div>
            </div>

            <div class="card">
                <h3>Vulnerability & CT Status</h3>
                <div id="vulnBox" style="margin-bottom: 1.5rem;"></div>
                <div class="intel-item">
                    <span class="intel-label">Certificate Transparency</span>
                    <span id="resCT" style="margin-top:0.25rem;">-</span>
                </div>
            </div>

            <div class="card">
                <h3>Trust Chain Hierarchy</h3>
                <div id="resChain" class="trust-chain"></div>
            </div>
        </div>
        <button class="status-pill pill-success" style="margin-top:2rem; width:100%; padding:1rem; cursor:pointer;" onclick="window.print()">GENERATE PDF AUDIT REPORT</button>
    </main>

    <script>
        async function runScan() {
            const host = document.getElementById('targetHost').value;
            if (!host) return;
            const loader = document.getElementById('loader');
            const dashboard = document.getElementById('dashboard');
            const error = document.getElementById('error');
            loader.style.display = 'block';
            dashboard.classList.remove('active');
            error.style.display = 'none';

            try {
                const response = await fetch(`/api/scan/ssl?host=${encodeURIComponent(host)}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('resGrade').innerText = data.grade.split(' ')[0];
                document.getElementById('resGradeSub').innerText = data.grade;

                if (data.geo_info) {
                    const geo = data.geo_info;
                    document.getElementById('resLoc').innerText = `${geo.city}, ${geo.country}`;
                    document.getElementById('resISP').innerText = geo.isp;
                    document.getElementById('resASN').innerText = geo.as_num;
                    document.getElementById('resIP').innerText = geo.query;
                }

                if (data.certificate) {
                    document.getElementById('resCT').innerHTML = data.certificate.ct_logged ? 
                        '<span class="status-pill pill-success">LOGGED (Validated)</span>' : 
                        '<span class="status-pill pill-danger">NOT LOGGED</span>';
                }

                const vb = document.getElementById('vulnBox');
                vb.innerHTML = '';
                if (data.vulnerabilities && data.vulnerabilities.length > 0) {
                    data.vulnerabilities.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'status-pill pill-danger';
                        div.style.display = 'block';
                        div.style.marginBottom = '0.5rem';
                        div.innerText = v;
                        vb.appendChild(div);
                    });
                } else {
                    vb.innerHTML = '<span class="status-pill pill-success">NO HANDSHAKE VULNS DETECTED</span>';
                }

                const chainBox = document.getElementById('resChain');
                chainBox.innerHTML = '';
                if (data.cert_chain) {
                    data.cert_chain.forEach(node => {
                        const div = document.createElement('div');
                        div.className = 'chain-node';
                        div.innerHTML = `<span class="node-name">${node}</span>`;
                        chainBox.appendChild(div);
                    });
                }

                dashboard.classList.add('active');
            } catch (e) {
                error.innerText = `Error: ${e.message}`;
                error.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
